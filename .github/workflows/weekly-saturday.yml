name: Weekly Saturday Summary

on:
  schedule:
    - cron: '37 07 * * 6' # 07:37 UTC ≈ 10:37 TRT hedef, Cumartesi. :00 yerine tek dakika + erken çalıştırma, GitHub gecikmesini telafi eder.
  workflow_dispatch:

jobs:
  weekly-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Fonts
        run: python scripts/download_fonts.py

      - name: Run Weekly Pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python run_weekly.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/output/ output/
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: update weekly summary [skip ci]"
            git push
          fi

