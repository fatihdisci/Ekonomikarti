name: Daily Noon Focus

on:
  schedule:
    - cron: '0 10 * * 1-5' # 10:00 UTC = 13:00 TRT, Pzt-Cum
  workflow_dispatch:

jobs:
  noon-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Fonts
        run: python scripts/download_fonts.py

      - name: Run Noon Pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python run_noon.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/output/ output/
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: update noon focus card [skip ci]"
            git push
          fi

      - name: Get Latest Image
        id: latest_image
        run: |
          LATEST_FILE=$(ls -t output/live/*.png | head -n 1)
          echo "filename=$LATEST_FILE" >> $GITHUB_ENV

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          filename: ${{ env.filename }}
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: "true"
